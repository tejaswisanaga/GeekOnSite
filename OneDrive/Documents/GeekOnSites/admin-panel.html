<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GeekOnSite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .logo h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-menu li {
            margin-bottom: 10px;
        }

        .nav-menu a {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            text-decoration: none;
            color: #333;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            background: #667eea;
            color: white;
        }

        .nav-menu i {
            margin-right: 10px;
            width: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd8;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        /* Content Area */
        .content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .stat-card h3 {
            font-size: 32px;
            color: #333;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #666;
            font-size: 14px;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-open {
            background: #fff3cd;
            color: #856404;
        }

        .status-in-progress {
            background: #cce5ff;
            color: #004085;
        }

        .status-resolved {
            background: #d4edda;
            color: #155724;
        }

        .status-closed {
            background: #e2e3e5;
            color: #383d41;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading i {
            font-size: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <h2><i class="fas fa-cogs"></i> GeekOnSite</h2>
                <p>Admin Panel</p>
            </div>
            <ul class="nav-menu">
                <li><a href="#" class="nav-link active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="#" class="nav-link" data-tab="tickets"><i class="fas fa-ticket-alt"></i> All Tickets</a></li>
                <li><a href="#" class="nav-link" data-tab="pending"><i class="fas fa-clock"></i> Pending Tickets</a></li>
                <li><a href="#" class="nav-link" data-tab="inprogress"><i class="fas fa-spinner"></i> In Progress</a></li>
                <li><a href="#" class="nav-link" data-tab="resolved"><i class="fas fa-check-circle"></i> Resolved</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <h1 id="pageTitle">Dashboard</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                    <button class="btn btn-secondary" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>

            <div class="content">
                <div id="alert" class="alert"></div>
                <div id="contentArea">
                    <!-- Content will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://geekonsite-2.onrender.com/api';
        let currentTab = 'dashboard';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            showTab('dashboard');
        });

        // Navigation
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const tab = this.getAttribute('data-tab');
                showTab(tab);
                
                // Update active state
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
            });
        });

        function showTab(tab) {
            currentTab = tab;
            const contentArea = document.getElementById('contentArea');
            const pageTitle = document.getElementById('pageTitle');
            
            // Update page title
            const titles = {
                'dashboard': 'Dashboard',
                'tickets': 'All Tickets',
                'pending': 'Pending Tickets',
                'inprogress': 'In Progress',
                'resolved': 'Resolved Tickets'
            };
            pageTitle.textContent = titles[tab] || 'Dashboard';
            
            // Show loading
            contentArea.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>Loading...</p></div>';
            
            // Load content
            switch(tab) {
                case 'dashboard':
                    loadDashboard();
                    break;
                case 'tickets':
                    loadTickets();
                    break;
                case 'pending':
                    loadTicketsByStatus('OPEN');
                    break;
                case 'inprogress':
                    loadTicketsByStatus('IN_PROGRESS');
                    break;
                case 'resolved':
                    loadTicketsByStatus('RESOLVED');
                    break;
                default:
                    loadDashboard();
            }
        }

        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE_URL}/admin/dashboard`);
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.data;
                    document.getElementById('contentArea').innerHTML = `
                        <div class="stats-grid">
                            <div class="stat-card">
                                <h3>${stats.totalTickets || 0}</h3>
                                <p>Total Tickets</p>
                            </div>
                            <div class="stat-card">
                                <h3>${stats.openTickets || 0}</h3>
                                <p>Open Tickets</p>
                            </div>
                            <div class="stat-card">
                                <h3>${stats.inProgressTickets || 0}</h3>
                                <p>In Progress</p>
                            </div>
                            <div class="stat-card">
                                <h3>${stats.resolvedTickets || 0}</h3>
                                <p>Resolved</p>
                            </div>
                        </div>
                        <div style="margin-top: 30px;">
                            <h3>Recent Activity</h3>
                            <p>Dashboard statistics loaded successfully.</p>
                        </div>
                    `;
                } else {
                    throw new Error(data.message || 'Failed to load dashboard');
                }
            } catch (error) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error loading dashboard: ${error.message}</p>
                    </div>
                `;
            }
        }

        async function loadTickets() {
            try {
                const response = await fetch(`${API_BASE_URL}/admin/tickets`);
                const data = await response.json();
                
                if (data.success) {
                    renderTicketsTable(data.data);
                } else {
                    throw new Error(data.message || 'Failed to load tickets');
                }
            } catch (error) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error loading tickets: ${error.message}</p>
                    </div>
                `;
            }
        }

        async function loadTicketsByStatus(status) {
            try {
                const response = await fetch(`${API_BASE_URL}/admin/tickets/status/${status}`);
                const data = await response.json();
                
                if (data.success) {
                    renderTicketsTable(data.data);
                } else {
                    throw new Error(data.message || 'Failed to load tickets');
                }
            } catch (error) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error loading tickets: ${error.message}</p>
                    </div>
                `;
            }
        }

        function renderTicketsTable(tickets) {
            if (!tickets || tickets.length === 0) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No tickets found</p>
                    </div>
                `;
                return;
            }

            const html = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Ticket #</th>
                                <th>Customer</th>
                                <th>Phone</th>
                                <th>Category</th>
                                <th>Status</th>
                                <th>Assigned To</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tickets.map(ticket => `
                                <tr>
                                    <td>${ticket.ticketNumber}</td>
                                    <td>${ticket.customerName || 'N/A'}</td>
                                    <td>${ticket.customerPhone || 'N/A'}</td>
                                    <td>${ticket.category || 'N/A'}</td>
                                    <td><span class="status-badge status-${ticket.status?.toLowerCase()}">${ticket.status || 'N/A'}</span></td>
                                    <td>${ticket.assignedToName || 'Unassigned'}</td>
                                    <td>${new Date(ticket.createdAt).toLocaleDateString()}</td>
                                    <td>
                                        <button class="btn btn-primary" onclick="viewTicket('${ticket.ticketNumber}')" style="padding: 5px 10px; font-size: 12px;">
                                            <i class="fas fa-eye"></i> View
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            
            document.getElementById('contentArea').innerHTML = html;
        }

        function viewTicket(ticketNumber) {
            showAlert(`Viewing ticket: ${ticketNumber}`, 'success');
        }

        function refreshData() {
            showTab(currentTab);
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = 'index.html';
            }
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
