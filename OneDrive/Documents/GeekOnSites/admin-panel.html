<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GeekOnSites</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #121212;
            border-right: 1px solid #2a2a2a;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
        }
        
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid #2a2a2a;
            text-align: center;
        }
        
        .sidebar-header h2 {
            color: #d4af37;
            font-size: 1.3rem;
            margin-bottom: 0.25rem;
        }
        
        .admin-info {
            padding: 1.5rem;
            border-bottom: 1px solid #2a2a2a;
            text-align: center;
        }
        
        .admin-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37 0%, #b78d3f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            color: #1a1a1a;
        }
        
        .admin-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }
        
        .nav-menu {
            list-style: none;
            padding: 1rem 0;
        }
        
        .nav-menu li {
            margin: 0.25rem 0;
        }
        
        .nav-menu a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1.5rem;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .nav-menu a:hover,
        .nav-menu a.active {
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            border-right: 3px solid #d4af37;
        }
        
        .nav-menu i {
            width: 20px;
            text-align: center;
        }
        
        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid #2a2a2a;
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #121212;
        }
        
        .btn-logout {
            width: 100%;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        
        .btn-logout:hover {
            background: #ef4444;
            color: #fff;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            background: #0a0a0a;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .page-header h1 {
            color: #fff;
            font-size: 1.8rem;
        }
        
        .header-actions {
            display: flex;
            gap: 1rem;
        }
        
        .btn-refresh {
            padding: 0.625rem 1rem;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        
        .btn-refresh:hover {
            background: #3a3a3a;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        /* Tables */
        .table-container {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 0.75rem;
            overflow: hidden;
        }
        
        .table-header {
            background: #2a2a2a;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #3a3a3a;
        }
        
        .table-title {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .table-content {
            padding: 1.5rem;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #2a2a2a;
        }
        
        th {
            background: #2a2a2a;
            color: #d4af37;
            font-weight: 600;
        }
        
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge-pending {
            background: #f59e0b;
            color: #fff;
        }
        
        .badge-progress {
            background: #3b82f6;
            color: #fff;
        }
        
        .badge-completed {
            background: #10b981;
            color: #fff;
        }
        
        .table-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-table {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.3s;
        }
        
        .btn-assign {
            background: #3b82f6;
            color: #fff;
        }
        
        .btn-view {
            background: #10b981;
            color: #fff;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #d4af37;
        }
        
        /* Alerts */
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            z-index: 10001;
            max-width: 300px;
        }
        
        .alert-success {
            background: #10b981;
            color: #fff;
            border-left: 4px solid #10b981;
        }
        
        .alert-error {
            background: #ef4444;
            color: #fff;
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-cog"></i> GeekOnSites</h2>
                <p>Admin Panel</p>
            </div>
            
            <div class="admin-info">
                <div class="admin-avatar">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div class="admin-name" id="adminName">Administrator</div>
            </div>
            
            <ul class="nav-menu">
                <li><a onclick="showTab('dashboard')" class="active">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a></li>
                <li><a onclick="showTab('calls')">
                    <i class="fas fa-headset"></i> All Calls
                </a></li>
                <li><a onclick="showTab('pending-calls')">
                    <i class="fas fa-clock"></i> Pending Calls
                </a></li>
                <li><a onclick="showTab('customers')">
                    <i class="fas fa-users"></i> All Customers
                </a></li>
                <li><a onclick="showTab('agents')">
                    <i class="fas fa-headset"></i> Agents
                </a></li>
            </ul>
            
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="page-header">
                <h1 id="pageTitle">Dashboard</h1>
                <div class="header-actions">
                    <button class="btn-refresh" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </div>
            
            <div id="contentArea">
                <!-- Content will be loaded here -->
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = 'https://geekonsite-2.onrender.com/api';
        let currentToken = localStorage.getItem('adminToken');
        let currentTab = 'dashboard';
        
        // Check authentication
        if (!currentToken) {
            window.location.href = 'admin-login.html';
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            showTab('dashboard');
        });
        
        function showTab(tab) {
            currentTab = tab;
            
            // Update active nav
            document.querySelectorAll('.nav-menu a').forEach(link => {
                link.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update page title
            const titles = {
                'dashboard': 'Dashboard',
                'calls': 'All Calls',
                'pending-calls': 'Pending Calls',
                'customers': 'All Customers',
                'agents': 'All Agents'
            };
            document.getElementById('pageTitle').textContent = titles[tab];
            
            // Load content
            if (tab === 'dashboard') {
                loadDashboard();
            } else if (tab === 'calls' || tab === 'pending-calls') {
                loadCalls(tab === 'pending-calls');
            } else if (tab === 'customers') {
                loadCustomers();
            } else if (tab === 'agents') {
                loadAgents();
            }
        }
        
        function loadDashboard() {
            const content = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="totalCalls">0</div>
                        <div class="stat-label">Total Tickets</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="pendingCalls">0</div>
                        <div class="stat-label">Pending Tickets</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="inProgressCalls">0</div>
                        <div class="stat-label">In Progress</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="completedCalls">0</div>
                        <div class="stat-label">Completed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalAgents">0</div>
                        <div class="stat-label">Total Agents</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalCustomers">0</div>
                        <div class="stat-label">Total Customers</div>
                    </div>
                </div>
            `;
            document.getElementById('contentArea').innerHTML = content;
            
            // Load stats
            fetchStats();
        }
        
        function loadCalls(pendingOnly = false) {
            const content = `
                <div class="table-container">
                    <div class="table-header">
                        <h2 class="table-title">${pendingOnly ? 'Pending' : 'All'} Calls</h2>
                    </div>
                    <div class="table-content">
                        <div id="callsTable">
                            <div class="empty-state">
                                <i class="fas fa-spinner fa-spin"></i>
                                <p>Loading...</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('contentArea').innerHTML = content;
            
            // Load calls data
            fetchCalls(pendingOnly);
        }
        
        function loadCustomers() {
            const content = `
                <div class="table-container">
                    <div class="table-header">
                        <h2 class="table-title">All Customers</h2>
                    </div>
                    <div class="table-content">
                        <div id="customersTable">
                            <div class="empty-state">
                                <i class="fas fa-spinner fa-spin"></i>
                                <p>Loading...</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('contentArea').innerHTML = content;
            
            // Load customers data
            fetchCustomers();
        }
        
        function loadAgents() {
            const content = `
                <div class="table-container">
                    <div class="table-header">
                        <h2 class="table-title">All Agents</h2>
                    </div>
                    <div class="table-content">
                        <div id="agentsTable">
                            <div class="empty-state">
                                <i class="fas fa-spinner fa-spin"></i>
                                <p>Loading...</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('contentArea').innerHTML = content;
            
            // Load agents data
            fetchAgents();
        }
        
        async function fetchStats() {
            try {
                const response = await fetch(`${API_BASE_URL}/tickets`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        const tickets = data.data || [];
                        const totalTickets = tickets.length;
                        const openTickets = tickets.filter(t => t.status === 'OPEN').length;
                        const inProgressTickets = tickets.filter(t => t.status === 'IN_PROGRESS').length;
                        const completedTickets = tickets.filter(t => t.status === 'RESOLVED' || t.status === 'CLOSED').length;
                        
                        document.getElementById('totalCalls').textContent = totalTickets;
                        document.getElementById('pendingCalls').textContent = openTickets;
                        document.getElementById('inProgressCalls').textContent = inProgressTickets;
                        document.getElementById('completedCalls').textContent = completedTickets;
                    }
                }
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }
        
        async function fetchCalls(pendingOnly = false) {
            try {
                const response = await fetch(`${API_BASE_URL}/tickets`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        let tickets = data.data || [];
                        if (pendingOnly) {
                            tickets = tickets.filter(t => t.status === 'OPEN' || t.status === 'PENDING');
                        }
                        renderCallsTable(tickets);
                    }
                }
            } catch (error) {
                console.error('Error fetching calls:', error);
                document.getElementById('callsTable').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error loading data</p>
                    </div>
                `;
            }
        }
        
        async function fetchCustomers() {
            try {
                const response = await fetch(`${API_BASE_URL}/admin/customers`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        renderCustomersTable(data.data || []);
                    }
                }
            } catch (error) {
                console.error('Error fetching customers:', error);
                document.getElementById('customersTable').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error loading data</p>
                    </div>
                `;
            }
        }
        
        async function fetchAgents() {
            try {
                const response = await fetch(`${API_BASE_URL}/admin/agents`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        renderAgentsTable(data.data || []);
                    }
                }
            } catch (error) {
                console.error('Error fetching agents:', error);
                document.getElementById('agentsTable').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error loading data</p>
                    </div>
                `;
            }
        }
        
        function renderCallsTable(calls) {
            if (calls.length === 0) {
                document.getElementById('callsTable').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No tickets found</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Ticket #</th>
                            <th>Customer</th>
                            <th>Status</th>
                            <th>Support Level</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            calls.forEach(call => {
                const statusClass = {
                    'OPEN': 'badge-pending',
                    'IN_PROGRESS': 'badge-progress',
                    'RESOLVED': 'badge-completed',
                    'CLOSED': 'badge-completed'
                }[call.status] || 'badge-pending';
                
                html += `
                    <tr>
                        <td>${call.ticketNumber || 'N/A'}</td>
                        <td>${call.customerName || 'N/A'}</td>
                        <td><span class="badge ${statusClass}">${call.status || 'OPEN'}</span></td>
                        <td>${call.supportLevel || 'L1'}</td>
                        <td>${new Date(call.createdAt).toLocaleDateString()}</td>
                        <td>
                            <button class="btn-table btn-view" onclick="viewTicket('${call.ticketNumber}')">
                                <i class="fas fa-eye"></i> View
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            document.getElementById('callsTable').innerHTML = html;
        }
        
        function renderCustomersTable(customers) {
            if (customers.length === 0) {
                document.getElementById('customersTable').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <p>No customers found</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            customers.forEach(customer => {
                const statusBadge = customer.verified ? 
                    '<span class="badge badge-completed">Verified</span>' : 
                    '<span class="badge badge-pending">Pending</span>';
                
                html += `
                    <tr>
                        <td>${customer.firstName + ' ' + customer.lastName}</td>
                        <td>${customer.email}</td>
                        <td>${customer.phone}</td>
                        <td>${statusBadge}</td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            document.getElementById('customersTable').innerHTML = html;
        }
        
        function renderAgentsTable(agents) {
            if (agents.length === 0) {
                document.getElementById('agentsTable').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-headset"></i>
                        <p>No agents found</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Agent ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Specialization</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            agents.forEach(agent => {
                html += `
                    <tr>
                        <td>${agent.agentId}</td>
                        <td>${agent.firstName + ' ' + agent.lastName}</td>
                        <td>${agent.email}</td>
                        <td>${agent.phone}</td>
                        <td>${agent.specialization || 'General'}</td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            document.getElementById('agentsTable').innerHTML = html;
        }
        
        function viewTicket(ticketNumber) {
            showAlert(`Viewing ticket: ${ticketNumber}`, 'success');
        }
        
        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminInfo');
            window.location.href = 'admin-login.html';
        }
        
        function refreshData() {
            showTab(currentTab);
        }
        
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `
                <strong>${type === 'success' ? 'Success' : 'Error'}:</strong> ${message}
                <button onclick="this.parentElement.remove()" style="float: right; margin-left: 10px;">&times;</button>
            `;
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                if (alertDiv.parentElement) {
                    alertDiv.parentElement.removeChild(alertDiv);
                }
            }, 3000);
        }
    </script>
</body>
</html>
