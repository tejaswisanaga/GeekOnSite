<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GeekOnsites</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--primary-color, #1a1a1a);
            color: var(--text-color, #e0e0e0);
            min-height: 100vh;
        }
        
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #121212;
            border-right: 1px solid #2a2a2a;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
        }
        
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid #2a2a2a;
            text-align: center;
        }
        
        .sidebar-header h2 {
            color: #d4af37;
            font-size: 1.3rem;
            margin-bottom: 0.25rem;
        }
        
        .sidebar-header p {
            color: #94a3b8;
            font-size: 0.8rem;
        }
        
        .admin-info {
            padding: 1.5rem;
            border-bottom: 1px solid #2a2a2a;
            text-align: center;
        }
        
        .admin-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37 0%, #b78d3f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            color: #1a1a1a;
        }
        
        .admin-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }
        
        .admin-role {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        
        .nav-menu {
            list-style: none;
            padding: 1rem 0;
        }
        
        .nav-menu li {
            margin: 0.25rem 0;
        }
        
        .nav-menu a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1.5rem;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .nav-menu a:hover,
        .nav-menu a.active {
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            border-right: 3px solid #d4af37;
        }
        
        .nav-menu i {
            width: 20px;
            text-align: center;
        }
        
        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid #2a2a2a;
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #121212;
        }
        
        .btn-logout {
            width: 100%;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        
        .btn-logout:hover {
            background: #ef4444;
            color: #fff;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            background: #0a0a0a;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .page-header h1 {
            color: #fff;
            font-size: 1.8rem;
        }
        
        .header-actions {
            display: flex;
            gap: 1rem;
        }
        
        .btn-refresh, .btn-primary {
            padding: 0.625rem 1rem;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #d4af37;
            border: none;
            color: #1a1a1a;
            font-weight: 600;
        }
        
        .btn-refresh:hover {
            background: #3a3a3a;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: var(--radius-lg, 0.75rem);
            padding: 1.5rem;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        /* Tables */
        .table-container {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: var(--radius-lg, 0.75rem);
            overflow: hidden;
        }
        
        .table-header {
            background: #2a2a2a;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #3a3a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .table-title {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .table-content {
            padding: 1.5rem;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #2a2a2a;
        }
        
        th {
            background: #2a2a2a;
            color: #d4af37;
            font-weight: 600;
        }
        
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge-pending {
            background: #f59e0b;
            color: #fff;
        }
        
        .badge-progress {
            background: #3b82f6;
            color: #fff;
        }
        
        .badge-completed {
            background: #10b981;
            color: #fff;
        }
        
        .badge-rejected {
            background: #ef4444;
            color: #fff;
        }
        
        .badge-verified {
            background: #10b981;
            color: #fff;
        }
        
        .table-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-table {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.3s;
        }
        
        .btn-assign {
            background: #3b82f6;
            color: #fff;
        }
        
        .btn-view {
            background: #10b981;
            color: #fff;
        }
        
        .btn-delete {
            background: #ef4444;
            color: #fff;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #d4af37;
        }
        
        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: var(--radius-lg, 0.75rem);
            padding: 2rem;
            width: 90%;
            max-width: 500px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .modal-header h3 {
            color: #fff;
            font-size: 1.3rem;
        }
        
        .btn-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .modal-body {
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #e0e0e0;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #2a2a2a;
            background: #0a0a0a;
            color: #fff;
            border-radius: 0.5rem;
        }
        
        .modal-footer {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }
        
        .btn-cancel {
            background: #2a2a2a;
            color: #e0e0e0;
        }
        
        .btn-save {
            background: #d4af37;
            color: #1a1a1a;
        }
        
        /* Alerts */
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            z-index: 10001;
            max-width: 300px;
        }
        
        .alert-success {
            background: #10b981;
            color: #fff;
            border-left: 4px solid #10b981;
        }
        
        .alert-error {
            background: #ef4444;
            color: #fff;
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-cog"></i> GeekOnSites</h2>
                <p>Admin Panel</p>
            </div>
            
            <div class="admin-info">
                <div class="admin-avatar">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div class="admin-name" id="adminName">Loading...</div>
                <div class="admin-role" id="adminRole">Administrator</div>
            </div>
            
            <ul class="nav-menu">
                <li><a href="#" onclick="showTab('dashboard')" class="active">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a></li>
                <li><a href="#" onclick="showTab('calls')">
                    <i class="fas fa-headset"></i> All Calls
                </a></li>
                <li><a href="#" onclick="showTab('pending-calls')">
                    <i class="fas fa-clock"></i> Pending Calls
                </a></li>
                <li><a href="#" onclick="showTab('customers')">
                    <i class="fas fa-users"></i> All Customers
                </a></li>
                <li><a href="#" onclick="showTab('agents')">
                    <i class="fas fa-headset"></i> Agents
                </a></li>
                <li><a href="#" onclick="showTab('verification')">
                    <i class="fas fa-id-card"></i> Pending Verification
                </a></li>
            </ul>
            
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="page-header">
                <h1 id="pageTitle">Dashboard</h1>
                <div class="header-actions">
                    <button class="btn-refresh" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                    <button class="btn-primary" onclick="exportData()">
                        <i class="fas fa-download"></i> Export
                    </button>
                </div>
            </div>
            
            <div id="tableContent">
                <!-- Content will be loaded here -->
            </div>
        </div>
    </div>
    
    <!-- Assign Modal -->
    <div class="modal" id="assignModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Assign Ticket to Agent</h3>
                <button class="btn-close" onclick="closeModal('assignModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="assignCallId">
                <div class="form-group">
                    <label for="assignAgentId">Select Agent</label>
                    <select id="assignAgentId">
                        <option value="">Loading agents...</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal('assignModal')">Cancel</button>
                <button class="btn-save" onclick="assignTicket()">Assign</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = 'https://geekonsite-2.onrender.com/api';
        let currentToken = null;
        let adminInfo = null;
        let currentTab = 'dashboard';
        let agentsList = [];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Admin panel loaded');
            checkAuthentication();
            loadDashboard();
        });
        
        function checkAuthentication() {
            currentToken = localStorage.getItem('adminToken');
            adminInfo = JSON.parse(localStorage.getItem('adminInfo') || '{}');
            
            console.log('Token check:', currentToken ? 'Token found' : 'No token');
            
            if (!currentToken || !adminInfo.token) {
                console.log('No valid authentication, redirecting to login');
                window.location.href = 'admin-login.html';
                return;
            }
            
            // Set admin info
            if (adminInfo && adminInfo.firstName) {
                document.getElementById('adminName').textContent = 
                    adminInfo.firstName + ' ' + (adminInfo.lastName || '');
            }
        }
        
        async function showTab(tab) {
            currentTab = tab;
            
            // Update active nav
            document.querySelectorAll('.nav-menu a').forEach(link => {
                link.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update page title
            const titles = {
                'dashboard': 'Dashboard',
                'calls': 'All Calls',
                'pending-calls': 'Pending Calls',
                'customers': 'All Customers',
                'agents': 'All Agents',
                'verification': 'Pending Verification'
            };
            document.getElementById('pageTitle').textContent = titles[tab];
            
            // Load data
            if (tab === 'dashboard') {
                await loadDashboard();
            } else if (tab === 'calls' || tab === 'pending-calls') {
                await loadCalls(tab === 'pending-calls');
            } else if (tab === 'customers') {
                await loadCustomers();
            } else if (tab === 'agents') {
                await loadAgents();
            } else if (tab === 'verification') {
                await loadPendingVerification();
            }
        }
        
        async function loadDashboard() {
            try {
                console.log('Loading dashboard...');
                
                // Load tickets for stats
                const ticketsResponse = await fetch(`${API_BASE_URL}/tickets`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                
                const ticketsData = await ticketsResponse.json();
                console.log('Tickets response:', ticketsData);
                
                if (ticketsData.success) {
                    const tickets = ticketsData.data || [];
                    const totalTickets = tickets.length;
                    const openTickets = tickets.filter(t => t.status === 'OPEN').length;
                    const inProgressTickets = tickets.filter(t => t.status === 'IN_PROGRESS').length;
                    const completedTickets = tickets.filter(t => t.status === 'RESOLVED' || t.status === 'CLOSED').length;
                    
                    // Load agents count
                    const agentsResponse = await fetch(`${API_BASE_URL}/admin/agents`, {
                        headers: { 'Authorization': `Bearer ${currentToken}` }
                    });
                    const agentsData = await agentsResponse.json();
                    const totalAgents = agentsData.success ? (agentsData.data || []).length : 0;
                    
                    // Load customers count
                    const customersResponse = await fetch(`${API_BASE_URL}/admin/customers`, {
                        headers: { 'Authorization': `Bearer ${currentToken}` }
                    });
                    const customersData = await customersResponse.json();
                    const totalCustomers = customersData.success ? (customersData.data || []).length : 0;
                    
                    updateStats({
                        totalCalls: totalTickets,
                        pendingCalls: openTickets,
                        inProgressCalls: inProgressTickets,
                        completedCalls: completedTickets,
                        totalAgents: totalAgents,
                        totalCustomers: totalCustomers
                    });
                } else {
                    console.error('Failed to load dashboard:', ticketsData.message);
                    showError('Failed to load dashboard: ' + ticketsData.message);
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
                showError('Network error loading dashboard');
            }
        }
        
        function updateStats(stats) {
            document.getElementById('totalCalls').textContent = stats.totalCalls || 0;
            document.getElementById('pendingCalls').textContent = stats.pendingCalls || 0;
            document.getElementById('inProgressCalls').textContent = stats.inProgressCalls || 0;
            document.getElementById('completedCalls').textContent = stats.completedCalls || 0;
            document.getElementById('totalAgents').textContent = stats.totalAgents || 0;
            document.getElementById('totalCustomers').textContent = stats.totalCustomers || 0;
        }
        
        async function loadCalls(pendingOnly = false) {
            try {
                console.log('Loading tickets...');
                
                const response = await fetch(`${API_BASE_URL}/tickets`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                
                console.log('Response status:', response.status);
                
                if (response.status === 403 || response.status === 401) {
                    console.error('Authentication failed - clearing session');
                    logout();
                    return;
                }
                
                const data = await response.json();
                console.log('Tickets data:', data);
                
                if (data.success) {
                    let tickets = data.data || [];
                    console.log('Loaded tickets:', tickets);
                    
                    // Filter pending tickets if needed
                    if (pendingOnly) {
                        tickets = tickets.filter(t => t.status === 'OPEN' || t.status === 'PENDING');
                    }
                    renderCallsTable(tickets);
                } else {
                    showError('Failed to load tickets: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error loading tickets:', error);
                showError('Network error loading tickets');
            }
        }
        
        function renderCallsTable(calls) {
            document.getElementById('tableTitle').textContent = currentTab === 'pending-calls' ? 
                'Pending Calls' : 'All Calls';
            
            if (calls.length === 0) {
                document.getElementById('tableContent').innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">0</div>
                            <div class="stat-label">Calls Found</div>
                        </div>
                    </div>
                `;
                return;
            }
            
            let html = `
                <div class="table-container">
                    <div class="table-header">
                        <h2 class="table-title">All Calls</h2>
                    </div>
                    <div class="table-content">
                        <table>
                            <thead>
                                <tr>
                                    <th>Ticket #</th>
                                    <th>Customer</th>
                                    <th>Status</th>
                                    <th>Support Level</th>
                                    <th>Agent</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
            `;
            
            calls.forEach(call => {
                const statusClass = {
                    'OPEN': 'badge-pending',
                    'IN_PROGRESS': 'badge-progress',
                    'RESOLVED': 'badge-completed',
                    'CLOSED': 'badge-completed',
                    'ESCALATED': 'badge-rejected',
                    'WAITING_CUSTOMER': 'badge-pending'
                }[call.status] || 'badge-pending';
                
                const priorityMap = {
                    'L1_FIRST_LINE': 'L1 - Basic',
                    'L2_SECOND_LINE': 'L2 - Advanced',
                    'L3_SPECIALIST': 'L3 - Specialist'
                };
                const priorityDisplay = priorityMap[call.supportLevel] || call.supportLevel || 'L1';
                
                const ticketNum = call.ticketNumber || call.callId || call.id || 'N/A';
                
                html += `
                    <tr>
                        <td>${ticketNum}</td>
                        <td>
                            ${call.customerName || 'N/A'}<br>
                            <small>${call.customerPhone || 'N/A'}</small>
                        </td>
                        <td><span class="badge ${statusClass}">${call.status || 'OPEN'}</span></td>
                        <td><span class="badge ${statusClass}">${priorityDisplay}</span></td>
                        <td>${call.assignedToName || call.assignedTo || 'Unassigned'}</td>
                        <td>${new Date(call.createdAt).toLocaleDateString()}</td>
                        <td>
                            <div class="table-actions">
                                ${call.status === 'OPEN' || call.status === 'PENDING' ? `
                                    <button class="btn-table btn-assign" onclick="openAssignModal('${ticketNum}')">
                                        Assign
                                    </button>
                                ` : ''}
                                <button class="btn-table btn-view" onclick="viewTicket('${ticketNum}')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            document.getElementById('tableContent').innerHTML = html;
        }
        
        async function loadCustomers() {
            try {
                const response = await fetch(`${API_BASE_URL}/admin/customers`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    renderCustomersTable(data.data || []);
                } else {
                    showError('Failed to load customers: ' + data.message);
                }
            } catch (error) {
                console.error('Error loading customers:', error);
                showError('Network error loading customers');
            }
        }
        
        function renderCustomersTable(customers) {
            document.getElementById('tableTitle').textContent = 'All Customers';
            
            if (customers.length === 0) {
                document.getElementById('tableContent').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <p>No customers found</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <div class="table-container">
                    <div class="table-header">
                        <h2 class="table-title">All Customers</h2>
                    </div>
                    <div class="table-content">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
            `;
            
            customers.forEach(customer => {
                const statusBadge = customer.verified ? 
                    '<span class="badge badge-verified">Verified</span>' : 
                    '<span class="badge badge-pending">Pending</span>';
                
                html += `
                    <tr>
                        <td>${customer.firstName + ' ' + customer.lastName}</td>
                        <td>${customer.email}</td>
                        <td>${customer.phone}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn-table btn-view" onclick="viewCustomer('${customer.id}')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            document.getElementById('tableContent').innerHTML = html;
        }
        
        async function loadAgents() {
            try {
                const response = await fetch(`${API_BASE_URL}/admin/agents`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    agentsList = data.data || [];
                    renderAgentsTable(agentsList);
                } else {
                    showError('Failed to load agents: ' + data.message);
                }
            } catch (error) {
                console.error('Error loading agents:', error);
                showError('Network error loading agents');
            }
        }
        
        function renderAgentsTable(agents) {
            document.getElementById('tableTitle').textContent = 'All Agents';
            
            if (agents.length === 0) {
                document.getElementById('tableContent').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-headset"></i>
                        <p>No agents found</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <div class="table-container">
                    <div class="table-header">
                        <h2 class="table-title">All Agents</h2>
                    </div>
                    <div class="table-content">
                        <table>
                            <thead>
                                <tr>
                                    <th>Agent ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Specialization</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
            `;
            
            agents.forEach(agent => {
                html += `
                    <tr>
                        <td>${agent.agentId}</td>
                        <td>${agent.firstName + ' ' + agent.lastName}</td>
                        <td>${agent.email}</td>
                        <td>${agent.phone}</td>
                        <td>${agent.specialization || 'General'}</td>
                        <td><span class="badge badge-verified">Active</span></td>
                    </tr>
                `;
            });
            
            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            document.getElementById('tableContent').innerHTML = html;
        }
        
        function openAssignModal(callId) {
            document.getElementById('assignCallId').value = callId;
            const select = document.getElementById('assignAgentId');
            select.innerHTML = '<option value="">Select Agent</option>';
            
            agentsList.forEach(agent => {
                const option = document.createElement('option');
                option.value = agent.agentId;
                option.textContent = `${agent.firstName} ${agent.lastName} (${agent.agentId})`;
                select.appendChild(option);
            });
            
            document.getElementById('assignModal').classList.add('active');
        }
        
        async function assignTicket() {
            const callId = document.getElementById('assignCallId').value;
            const agentId = document.getElementById('assignAgentId').value;
            
            if (!agentId) {
                showError('Please select an agent');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/tickets/${callId}/assign`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ agentId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    closeModal('assignModal');
                    showSuccess('Ticket assigned successfully');
                    refreshData();
                } else {
                    showError('Failed to assign ticket: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                showError('Network error assigning ticket');
            }
        }
        
        function viewTicket(ticketNumber) {
            showInfo(`Viewing ticket: ${ticketNumber}`);
        }
        
        function viewCustomer(customerId) {
            showInfo(`Viewing customer: ${customerId}`);
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminInfo');
            window.location.href = 'admin-login.html';
        }
        
        function refreshData() {
            showTab(currentTab);
        }
        
        function exportData() {
            showInfo('Export functionality coming soon');
        }
        
        function showError(message) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-error';
            alertDiv.innerHTML = `
                <strong>Error:</strong> ${message}
                <button onclick="this.parentElement.remove()" style="float: right; margin-left: 10px;">&times;</button>
            `;
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                if (alertDiv.parentElement) {
                    alertDiv.parentElement.removeChild(alertDiv);
                }
            }, 5000);
        }
        
        function showSuccess(message) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-success';
            alertDiv.innerHTML = `
                <strong>Success:</strong> ${message}
                <button onclick="this.parentElement.remove()" style="float: right; margin-left: 10px;">&times;</button>
            `;
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                if (alertDiv.parentElement) {
                    alertDiv.parentElement.removeChild(alertDiv);
                }
            }, 3000);
        }
        
        function showInfo(message) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-success';
            alertDiv.innerHTML = `
                <strong>Info:</strong> ${message}
                <button onclick="this.parentElement.remove()" style="float: right; margin-left: 10px;">&times;</button>
            `;
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                if (alertDiv.parentElement) {
                    alertDiv.parentElement.removeChild(alertDiv);
                }
            }, 2000);
        }
    </script>
</body>
</html>
