<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Registration - GeekOnSites</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('images/homepage display 1.jpeg') center/cover no-repeat;
            padding: 2rem;
        }
        
        .register-box {
            background: rgba(26, 26, 26, 0.95);
            border: 2px solid var(--secondary-color);
            border-radius: var(--radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .register-header h1 {
            color: var(--secondary-color);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            font-weight: 500;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--light-gray);
            background: var(--primary-color);
            color: var(--white);
            border-radius: var(--radius-md);
            font-size: 1rem;
        }
        
        .btn-register {
            width: 100%;
            padding: 1rem;
            background: var(--gold-gradient);
            color: var(--primary-color);
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .portal-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .portal-links a {
            padding: 0.5rem 1rem;
            border: 1px solid var(--secondary-color);
            color: var(--secondary-color);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-box">
            <a href="index.html" style="color: var(--text-light); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
            
            <div class="register-header">
                <h1><i class="fas fa-user-tie"></i> Agent Registration</h1>
                <p>Join our technician team</p>
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" required placeholder="Enter your phone number">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Create password">
                </div>
                
                <div class="form-group">
                    <label>Specialization</label>
                    <select id="specialization" required>
                        <option value="">Select specialization</option>
                        <option value="COMPUTER">Computer Services</option>
                        <option value="PRINTER">Printer Services</option>
                        <option value="NETWORK">Network & WiFi</option>
                        <option value="SECURITY">Security Solutions</option>
                        <option value="CCTV">CCTV Setup</option>
                        <option value="GENERAL">General IT Support</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-register">
                    <i class="fas fa-user-plus"></i> Register as Agent
                </button>
            </form>
            
            <div class="portal-links">
                <a href="agent-login.html">Agent Login</a>
                <a href="admin-login.html">Admin Login</a>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = 'https://geekonsite-2.onrender.com/api';
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
                specialization: document.getElementById('specialization').value,
                experience: '1-2 years'
            };
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/register/agent`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Registration successful! Agent ID: ' + data.data.agentId);
                    window.location.href = 'agent-login.html';
                } else {
                    alert('Registration failed: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Network error. Please try again.');
            }
        });
    </script>
</body>
</html>
